<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOOX - محادثة Telegram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-image: url('a628486ff04656f787be2a3bad17352e_low.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #chatContainer {
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            padding: 10px;
            max-height: 70vh;
        }

        .message-container {
            display: flex;
            align-items: center;
            position: relative;
            margin-bottom: 10px;
        }

        .sent {
            justify-content: flex-end;
        }

        .received {
            justify-content: flex-start;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
            position: relative;
        }

        .sent .message {
            background-color: #007bff;
            color: white;
        }

        .received .message {
            background-color: #f1f1f1;
            color: black;
        }

        .options {
            position: absolute;
            top: -25px;
            right: 5px;
            display: none;
        }

        .options button {
            font-size: 12px;
            padding: 5px;
            margin: 2px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .copy-btn {
            background-color: #28a745;
            color: white;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
        }

        .input-container {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
        }

        .input-container textarea, .input-container button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            margin: 5px;
        }

        .input-container textarea {
            flex: 1;
            resize: none;
        }

        .input-container button {
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }

        #idInputContainer {
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="idInputContainer">
        <label for="username">أدخل ID المستخدم:</label><br>
        <input type="text" id="username" placeholder="ID">
        <button onclick="confirmUserId()">موافق</button>
    </div>

    <div id="chatContainer"></div>

    <div class="input-container hidden" id="messageInputContainer">
        <textarea id="message" rows="1" placeholder="اكتب رسالتك..."></textarea>
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        const token = "7283631968:AAGOJaiPIpsXeUxaAV902aQx2nhtEzIvWa0";
        let chatId = null;
        let lastMessageId = 0;
        const chatContainer = document.getElementById("chatContainer");
        const messageInputContainer = document.getElementById("messageInputContainer");

        function confirmUserId() {
            chatId = document.getElementById("username").value.trim();
            if (chatId) {
                document.getElementById("idInputContainer").classList.add("hidden");
                messageInputContainer.classList.remove("hidden");
            }
        }

        function sendMessage() {
            const messageText = document.getElementById("message").value.trim();
            if (!chatId || !messageText) return;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(messageText)}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        appendMessage("sent", messageText, data.result.message_id);
                        document.getElementById("message").value = "";
                    } else {
                        alert("فشل في إرسال الرسالة، تحقق من ID!");
                    }
                })
                .catch(() => {
                    alert("خطأ أثناء الإرسال!");
                });
        }

        function appendMessage(type, text, messageId) {
            if (document.querySelector(`[data-id="${messageId}"]`)) return;

            const messageContainer = document.createElement("div");
            messageContainer.classList.add("message-container", type);
            messageContainer.dataset.id = messageId;

            const messageElement = document.createElement("div");
            messageElement.classList.add("message");
            messageElement.textContent = text;

            const options = document.createElement("div");
            options.classList.add("options");

            const copyBtn = document.createElement("button");
            copyBtn.classList.add("copy-btn");
            copyBtn.innerHTML = "💾";
            copyBtn.onclick = () => copyText(text);

            const deleteBtn = document.createElement("button");
            deleteBtn.classList.add("delete-btn");
            deleteBtn.innerHTML = "❌";
            deleteBtn.onclick = () => deleteMessage(messageContainer, messageId);

            options.appendChild(copyBtn);
            options.appendChild(deleteBtn);

            messageContainer.appendChild(messageElement);
            messageContainer.appendChild(options);
            chatContainer.prepend(messageContainer);

            messageElement.addEventListener("contextmenu", function(event) {
                event.preventDefault();
                toggleOptions(options);
            });

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function toggleOptions(options) {
            document.querySelectorAll(".options").forEach(opt => opt.style.display = "none");
            options.style.display = options.style.display === "block" ? "none" : "block";
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => alert("تم النسخ!"));
        }

        function deleteMessage(element, messageId) {
            if (!messageId) {
                element.remove();
                return;
            }

            const url = `https://api.telegram.org/bot${token}/deleteMessage?chat_id=${chatId}&message_id=${messageId}`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        element.remove();
                    } else {
                        alert("فشل في حذف الرسالة!");
                    }
                })
                .catch(() => alert("خطأ أثناء حذف الرسالة!"));
        }

        function fetchMessages() {
            if (!chatId) return;

            const url = `https://api.telegram.org/bot${token}/getUpdates`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    data.result.forEach(msg => {
                        if (msg.message && msg.message.text && msg.message.message_id > lastMessageId) {
                            appendMessage("received", msg.message.text, msg.message.message_id);
                            lastMessageId = msg.message.message_id;
                        }
                    });
                });
        }

        setInterval(fetchMessages, 5000);
    </script>

</body>
</html>
