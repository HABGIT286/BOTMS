<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f1f1f1;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 1em;
            width: 100%;
        }
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <h2>الرجاء إدخال الرمز</h2>
        <input type="text" id="code" placeholder="أدخل الرمز هنا" />
        <button onclick="verifyCode()">تأكيد</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        const correctCode = "MONDXSD3";
        let attempts = 0;
        const maxAttempts = 4;
        let lockTime = 0;

        function verifyCode() {
            const codeInput = document.getElementById("code").value;
            const errorDiv = document.getElementById("error");

            if (lockTime > 0) {
                const timeLeft = Math.ceil(lockTime / 60);
                errorDiv.textContent = `تم قفل الوصول، يمكنك المحاولة بعد ${timeLeft} دقيقة.`;
                return;
            }

            if (codeInput === correctCode) {
                window.location.href = "chat.html"; // انتقل إلى صفحة المراسلة
            } else {
                attempts++;
                if (attempts >= maxAttempts) {
                    lockTime = 15 * 60; // قفل الوصول لمدة 15 دقيقة
                    errorDiv.textContent = "لقد أدخلت الرمز بشكل خاطئ 4 مرات، سيتم قفل الوصول لمدة 15 دقيقة.";
                    setTimeout(() => {
                        lockTime = 0;
                    }, 15 * 60 * 1000); // إلغاء القفل بعد 15 دقيقة
                } else {
                    errorDiv.textContent = "الرمز غير صحيح، حاول مجددًا.";
                }
            }
        }
    </script>

</body>
</html>
