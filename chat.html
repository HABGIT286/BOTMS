<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOOX - دردشة عبر Telegram API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        .chat-container {
            width: 80%;
            max-width: 400px;
            margin: 20px auto;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
        }

        .message-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            position: relative;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            position: relative;
        }

        .sent {
            align-self: flex-end;
        }

        .sent .message {
            background-color: #007bff;
            color: white;
        }

        .received {
            align-self: flex-start;
        }

        .received .message {
            background-color: #f1f1f1;
            color: black;
        }

        .status {
            font-size: 0.8em;
            color: gray;
            margin-top: 2px;
        }

        .message-container:hover .options {
            display: flex;
        }

        .options {
            display: none;
            position: absolute;
            bottom: -20px;
            right: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 5px;
            font-size: 0.8em;
            cursor: pointer;
        }

        .options span {
            margin: 0 5px;
            cursor: pointer;
        }

        .options span:hover {
            color: red;
        }
    </style>
</head>
<body>

    <h2>NOOX</h2>

    <form id="messageForm">
        <label for="username">أدخل ID المستخدم:</label><br>
        <input type="text" id="username" name="username" placeholder="ID"><br><br>

        <label for="message">أدخل الرسالة:</label><br>
        <textarea id="message" name="message" rows="4" required></textarea><br><br>

        <button type="submit">إرسال</button>
    </form>

    <h3>المحادثة:</h3>
    <div class="chat-container" id="chatContainer"></div>

    <script>
        const token = "7283631968:AAGOJaiPIpsXeUxaAV902aQx2nhtEzIvWa0";
        const chatIdInput = document.getElementById("username");
        const chatContainer = document.getElementById("chatContainer");
        let lastMessageId = 0;

        document.getElementById("messageForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const chatId = chatIdInput.value.trim();
            const messageText = document.getElementById("message").value;

            if (!chatId || !messageText) return;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(messageText)}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        appendMessage("sent", messageText, "تم الإرسال", data.result.message_id);
                        setTimeout(() => {
                            markAsRead(data.result.message_id);
                        }, 3000);
                    } else {
                        alert("فشل في إرسال الرسالة، تحقق من ID!");
                    }
                })
                .catch(error => {
                    alert("خطأ أثناء الإرسال!");
                });

            document.getElementById("message").value = "";
        });

        function appendMessage(type, text, status = "", messageId = null) {
            const messageContainer = document.createElement('div');
            messageContainer.classList.add("message-container", type);
            messageContainer.dataset.id = messageId;

            const messageElement = document.createElement('div');
            messageElement.classList.add("message");
            messageElement.textContent = text;

            const statusElement = document.createElement('div');
            statusElement.classList.add("status");
            statusElement.textContent = status;

            const options = document.createElement('div');
            options.classList.add("options");
            options.innerHTML = `<span onclick="copyMessage('${text}')">📋 نسخ</span> | 
                                 <span onclick="deleteMessage(this, '${messageId}')">❌ حذف</span>`;

            messageContainer.appendChild(messageElement);
            if (type === "sent") messageContainer.appendChild(statusElement);
            messageContainer.appendChild(options);
            chatContainer.appendChild(messageContainer);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function markAsRead(messageId) {
            const messages = document.querySelectorAll(".sent .status");
            messages.forEach(status => {
                if (!status.dataset.read) {
                    status.textContent = "تم القراءة";
                    status.dataset.read = true;
                }
            });
        }

        function fetchMessages() {
            const url = `https://api.telegram.org/bot${token}/getUpdates`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    data.result.forEach(msg => {
                        if (msg.message && msg.message.message_id > lastMessageId) {
                            lastMessageId = msg.message.message_id;
                            if (msg.message.text) {
                                appendMessage("received", msg.message.text);
                            }
                        }
                    });
                })
                .catch(error => console.error("خطأ في جلب الرسائل:", error));
        }

        function copyMessage(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("تم نسخ الرسالة!");
            });
        }

        function deleteMessage(element, messageId) {
            const messageContainer = element.closest(".message-container");

            if (messageId) {
                const url = `https://api.telegram.org/bot${token}/deleteMessage?chat_id=${chatIdInput.value}&message_id=${messageId}`;
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        if (data.ok) {
                            messageContainer.remove();
                        } else {
                            alert("فشل في حذف الرسالة!");
                        }
                    })
                    .catch(error => console.error("خطأ أثناء حذف الرسالة:", error));
            } else {
                messageContainer.remove();
            }
        }

        setInterval(fetchMessages, 5000);
    </script>

</body>
</html>
