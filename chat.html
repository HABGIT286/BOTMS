<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOOX - محادثة Telegram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-image: url('a628486ff04656f787be2a3bad17352e_low.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #chatContainer {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            padding: 10px;
        }

        .message-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .sent {
            justify-content: flex-end;
        }

        .received {
            justify-content: flex-start;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
            position: relative;
        }

        .sent .message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
        }

        .received .message {
            background-color: #f1f1f1;
            color: black;
            align-self: flex-start;
        }

        .message-container:hover {
            cursor: pointer;
        }

        .message-container:active {
            opacity: 0.7;
        }

        .input-container {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.3);
        }

        .input-container input, .input-container textarea, .input-container button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            margin: 5px;
        }

        .input-container input {
            flex: 1;
        }

        .input-container button {
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }

        .input-container button:hover {
            background-color: #218838;
        }

        #idInputContainer {
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="idInputContainer">
        <label for="username">أدخل ID المستخدم:</label><br>
        <input type="text" id="username" placeholder="ID">
        <button onclick="confirmUserId()">موافق</button>
    </div>

    <div id="chatContainer"></div>

    <div class="input-container hidden" id="messageInputContainer">
        <textarea id="message" rows="1" placeholder="اكتب رسالتك..."></textarea>
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        const token = "7283631968:AAGOJaiPIpsXeUxaAV902aQx2nhtEzIvWa0";
        let chatId = null;
        const chatContainer = document.getElementById("chatContainer");
        const messageInputContainer = document.getElementById("messageInputContainer");

        function confirmUserId() {
            chatId = document.getElementById("username").value.trim();
            if (chatId) {
                document.getElementById("idInputContainer").classList.add("hidden");
                messageInputContainer.classList.remove("hidden");
            }
        }

        function sendMessage() {
            const messageText = document.getElementById("message").value.trim();
            if (!chatId || !messageText) return;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(messageText)}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        appendMessage("sent", messageText, data.result.message_id);
                        document.getElementById("message").value = "";
                        chatContainer.scrollTop = 0;
                    } else {
                        alert("فشل في إرسال الرسالة، تحقق من ID!");
                    }
                })
                .catch(() => {
                    alert("خطأ أثناء الإرسال!");
                });
        }

        function appendMessage(type, text, messageId = null) {
            const messageContainer = document.createElement("div");
            messageContainer.classList.add("message-container", type);
            messageContainer.dataset.id = messageId;

            const messageElement = document.createElement("div");
            messageElement.classList.add("message");
            messageElement.textContent = text;

            messageContainer.appendChild(messageElement);
            chatContainer.insertBefore(messageContainer, chatContainer.firstChild);
            
            chatContainer.scrollTop = 0;

            messageContainer.addEventListener("contextmenu", function(event) {
                event.preventDefault();
                showOptions(messageContainer, text, messageId);
            });
        }

        function showOptions(element, text, messageId) {
            const action = confirm("اختر الإجراء:\n1. نسخ الرسالة\n2. حذف الرسالة");
            if (action) {
                navigator.clipboard.writeText(text).then(() => alert("تم النسخ!"));
            } else {
                deleteMessage(element, messageId);
            }
        }

        function deleteMessage(element, messageId) {
            if (!messageId) {
                element.remove();
                return;
            }

            const url = `https://api.telegram.org/bot${token}/deleteMessage?chat_id=${chatId}&message_id=${messageId}`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        element.remove();
                    } else {
                        alert("فشل في حذف الرسالة!");
                    }
                })
                .catch(() => alert("خطأ أثناء حذف الرسالة!"));
        }

        function fetchMessages() {
            if (!chatId) return;

            const url = `https://api.telegram.org/bot${token}/getUpdates`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    data.result.forEach(msg => {
                        if (msg.message && msg.message.text && !document.querySelector(`[data-id='${msg.message.message_id}']`)) {
                            appendMessage("received", msg.message.text, msg.message.message_id);
                        }
                    });
                })
                .catch(() => console.error("خطأ في جلب الرسائل"));
        }

        setInterval(fetchMessages, 3000);
    </script>

</body>
</html>
