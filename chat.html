<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        #username {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .chat-container {
            width: 80%;
            max-width: 400px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            max-height: 400px;
            overflow-y: auto;
        }

        .message-container {
            display: flex;
            flex-direction: column;
            position: relative;
            margin-bottom: 10px;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            position: relative;
            cursor: pointer;
        }

        .sent {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            text-align: right;
        }

        .received {
            background-color: #f1f1f1;
            color: black;
            align-self: flex-start;
            text-align: left;
        }

        .status {
            font-size: 0.8em;
            margin-top: 5px;
            color: gray;
        }

        .sent .status {
            align-self: flex-end;
            color: white;
        }

        .message-options {
            display: none;
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px;
            border-radius: 5px;
            white-space: nowrap;
            cursor: pointer;
        }

        .message-options span {
            margin: 0 5px;
            padding: 5px;
            cursor: pointer;
        }

        .input-container {
            width: 80%;
            max-width: 400px;
            margin-top: 20px;
            display: flex;
        }

        textarea {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            width: 20%;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            padding: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .typing-status {
            text-align: right;
            font-size: 0.9em;
            color: gray;
            padding: 5px;
        }
    </style>
</head>
<body>

    <input type="text" id="username" placeholder="أدخل اسم المستخدم" oninput="showChat()"/>

    <div class="chat-container" id="chatContainer" style="display:none;">
        <div class="message-container received">
            <div class="message">مرحبًا، كيف يمكنني مساعدتك؟</div>
            <div class="status">تم القراءة</div>
        </div>
    </div>

    <div class="input-container" id="inputContainer" style="display:none;">
        <textarea id="message" placeholder="اكتب رسالتك هنا..."></textarea>
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        function showChat() {
            const username = document.getElementById("username").value;
            if (username) {
                document.getElementById("chatContainer").style.display = "block";
                document.getElementById("inputContainer").style.display = "flex";
                document.getElementById("username").style.display = "none";
            }
        }

        function sendMessage() {
            const messageText = document.getElementById("message").value.trim();
            if (!messageText) return;

            const messageContainer = document.createElement("div");
            messageContainer.classList.add("message-container", "sent");

            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message");
            messageDiv.textContent = messageText;
            messageDiv.onclick = () => showOptions(messageDiv);

            const statusDiv = document.createElement("div");
            statusDiv.classList.add("status");
            statusDiv.textContent = "تم الإرسال";

            messageContainer.appendChild(messageDiv);
            messageContainer.appendChild(statusDiv);
            document.getElementById("chatContainer").appendChild(messageContainer);

            document.getElementById("message").value = "";
            document.getElementById("chatContainer").scrollTop = document.getElementById("chatContainer").scrollHeight;
            
            setTimeout(() => {
                statusDiv.textContent = "تم القراءة";
            }, 2000);
        }

        function showOptions(messageDiv) {
            let existingOptions = messageDiv.parentElement.querySelector(".message-options");
            if (existingOptions) {
                existingOptions.remove();
                return;
            }

            const optionsDiv = document.createElement("div");
            optionsDiv.classList.add("message-options");
            optionsDiv.innerHTML = `
                <span onclick="copyMessage('${messageDiv.textContent}')">نسخ</span> |
                <span onclick="deleteMessage(this)">حذف</span>
            `;
            messageDiv.parentElement.appendChild(optionsDiv);
            optionsDiv.style.display = "block";
        }

        function copyMessage(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("تم نسخ الرسالة!");
            });
        }

        function deleteMessage(deleteBtn) {
            const messageContainer = deleteBtn.closest(".message-container");
            messageContainer.remove();
        }
    </script>

</body>
</html>
